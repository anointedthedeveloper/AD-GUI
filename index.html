<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeDownloader - Home</title>
    <link rel="icon" type="image/png" href="assets/adbg.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="assets/adbg.png" width="32" height="32" alt="AD Logo" style="border-radius: 8px;">
                    <span>AnimeDownloader</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="home.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Home
                </a>
                <a href="downloads.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Downloads
                </a>
                <a href="library.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Library
                </a>
                <a href="history.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                    </svg>
                    History
                </a>
                <a href="settings.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Settings
                </a>
                <a href="about.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    About
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="page-header">
                <h1>Search Anime</h1>
                <p>Find and download your favorite anime</p>
            </div>
            <div class="search-section">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search anime by name...">
                    <button id="search-btn">Search</button>
                </div>
                <div class="url-paste">
                    <span>or</span>
                    <div class="url-input">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <input type="text" id="url-input" placeholder="Paste anime URL...">
                        <button id="paste-url-btn">Paste</button>
                    </div>
                </div>
            </div>
            <div class="trending-section">
                <h3>Trending Anime</h3>
                <div class="trending-grid" id="trending-grid">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
            
            <!-- URL Preview Section (Hidden by default) -->
            <div class="url-preview-section" id="url-preview-section" style="display: none;">
                <div class="url-preview-card">
                    <h3>URL Preview</h3>
                    <div class="preview-content" id="preview-content">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                    <div class="preview-actions">
                        <button class="preview-action-btn" id="confirm-url">Confirm & Load</button>
                        <button class="preview-action-btn cancel" id="cancel-url">Cancel</button>
                    </div>
                </div>
            </div>
            
            <!-- Anime Details Section (Hidden by default) -->
            <div class="anime-details-section" id="anime-details-section" style="display: none;">
                <div class="anime-details">
                    <div class="anime-poster">
                        <div class="poster-placeholder" id="anime-poster">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21,15 16,10 5,21"/>
                            </svg>
                        </div>
                    </div>
                    <div class="anime-info">
                        <h1 id="anime-title">Loading...</h1>
                        <p id="anime-episodes">Loading...</p>
                        <p id="anime-description">Loading...</p>
                        <div class="quality-selector">
                            <span>Quality:</span>
                            <button class="quality-btn" data-quality="480p">480p</button>
                            <button class="quality-btn active" data-quality="720p">720p</button>
                            <button class="quality-btn" data-quality="1080p">1080p</button>
                        </div>
                        <button class="download-all-btn" id="download-all">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7,10 12,15 17,10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Download All Episodes
                        </button>
                        <button class="close-details-btn" id="close-details">Close</button>
                    </div>
                </div>
                <div class="episodes-list">
                    <h3>Episodes</h3>
                    <div class="episodes-container" id="episodes-container">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Sidebar - Recent Searches -->
        <aside class="right-sidebar">
            <div class="right-sidebar-header">
                <h3>Recent Searches</h3>
                <button class="clear-history-btn" id="clear-history">Clear</button>
            </div>
            <div style="padding:4px 24px 8px;font-size:12px;font-weight:500;" id="fs-badge">🟡 CF Bypass Starting...</div>
            <div style="padding:0 24px 8px;font-size:11px;color:var(--gray-400);" id="fs-timer"></div>
            <div class="recent-list" id="recent-list">
                <!-- Dynamic content will be loaded here -->
            </div>
        </aside>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
        <p id="loader-msg">Loading...</p>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
