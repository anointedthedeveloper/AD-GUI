<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeDownloader - Settings</title>
    <link rel="icon" type="image/png" href="assets/adbg.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="assets/adbg.png" width="32" height="32" alt="AD Logo" style="border-radius: 8px;">
                    <span>AnimeDownloader</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Home
                </a>
                <a href="downloads.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Downloads
                </a>
                <a href="library.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Library
                </a>
                <a href="history.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                    </svg>
                    History
                </a>
                <a href="settings.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Settings
                </a>
                <a href="about.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    About
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="page-header">
                <h1>Settings</h1>
                <p>Configure your preferences</p>
            </div>
            <div class="settings-container">
                <div class="setting-group">
                    <label>App Icon</label>
                    <div class="icon-preview">
                        <img src="assets/adbg.png" width="64" height="64" alt="App Icon" style="border-radius: 12px;">
                    </div>
                </div>
                <div class="setting-group">
                    <label>Download Folder</label>
                    <div class="setting-input">
                        <input type="text" id="download-folder" readonly>
                        <button id="browse-folder">Browse</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Default Quality</label>
                    <div class="quality-options">
                        <label class="radio-option">
                            <input type="radio" name="quality" value="480p">
                            <span>480p</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="720p">
                            <span>720p</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="1080p">
                            <span>1080p</span>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Concurrent Downloads</label>
                    <div class="setting-input">
                        <input type="number" id="concurrent-downloads" value="3" min="1" max="10">
                    </div>
                </div>
                <div class="setting-group">
                    <label>Theme</label>
                    <div class="theme-options">
                        <label class="radio-option">
                            <input type="radio" name="theme" value="light">
                            <span>Light</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="theme" value="dark">
                            <span>Dark</span>
                        </label>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Notifications</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="notifications">
                        <label for="notifications" class="slider"></label>
                    </div>
                </div>
                <div class="setting-group">
                    <label>GitHub Repository</label>
                    <p>https://github.com/anointedthedeveloper/AD-GUI</p>
                </div>
                <div class="setting-actions">
                    <button class="save-btn" id="save-settings">Save Settings</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
